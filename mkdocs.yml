site_name: Arch Toolkit
site_description: Kotlin Multiplatform utilities for storage, state, and request orchestration.
site_url: https://matheus-corregiari.github.io/arch-toolkit/
repo_url: https://github.com/matheus-corregiari/arch-toolkit
edit_uri: blob/master/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/toolbox
  palette:
    primary: white
    accent: teal
  font:
    text: DM Sans
    code: DM Mono
  features:
    - content.tabs.link
    - content.code.copy
    - navigation.indexes
    - navigation.sections

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - javascripts/mermaid.mjs

nav:
  - Home: index.md
  - Using Arch Toolkit:
      - Getting Started: getting-started.md
      - Choosing Modules: using/choosing-modules.md
      - Target Compatibility: using/compatibility.md
      - Core Concepts: core-concepts.md
      - Practical Recipes: recipes.md
      - Migration and Updates: using/migration.md
  - Modules:
      - Overview: modules/index.md
      - Storage Core: modules/storage-core.md
      - Storage DataStore: modules/storage-datastore.md
      - Storage Memory: modules/storage-memory.md
      - State Handle: modules/state-handle.md
      - Splinter: modules/splinter.md
  - Sample Application:
      - Overview: sample/index.md
      - Architecture: sample/architecture.md
      - Running the Sample: sample/running.md
      - Demonstrated Flows: sample/flows.md
      - Known Limitations: sample/limitations.md
  - Troubleshooting: troubleshooting.md
  - Contributing:
      - Overview: contributing.md
      - Repository Architecture: contributing/architecture.md
      - Development and Quality: contributing/development.md
      - Documentation: contributing/documentation.md
      - Dependency Updates: contributing/dependencies.md
      - Publishing and Releases: contributing/release.md
  - API Reference: api/index.md
  - Changelog: changelog/index.md
