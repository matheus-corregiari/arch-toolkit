site_name: Arch Toolkit
site_description: Kotlin Multiplatform utilities for storage, state, and request orchestration.
site_url: https://matheus-corregiari.github.io/arch-toolkit/
repo_url: https://github.com/matheus-corregiari/arch-toolkit
edit_uri: blob/master/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/toolbox
  palette:
    primary: white
    accent: teal
  font:
    text: DM Sans
    code: DM Mono
  features:
    - content.tabs.link
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Modules:
      - Overview: modules/index.md
      - Storage Core: modules/storage-core.md
      - Storage DataStore: modules/storage-datastore.md
      - Storage Memory: modules/storage-memory.md
      - State Handle: modules/state-handle.md
      - Splinter: modules/splinter.md
  - Core Concepts: core-concepts.md
  - Usage Recipes: recipes.md
  - Changelog: changelog/index.md
  - Contributing: contributing.md
  - API Reference: api/index.md
