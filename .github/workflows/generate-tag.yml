name: Generate Release Tag

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find merged release branch
        id: release
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const pulls = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              { owner, repo, commit_sha: context.sha },
            );
            const pull = pulls.find(({ merged_at, head }) =>
              merged_at && (head.ref.startsWith("release/") || head.ref.startsWith("hotfix/"))
            );

            if (!pull) {
              core.notice("No merged release or hotfix branch is associated with this commit.");
              core.setOutput("should_tag", "false");
              return;
            }

            const match = /^(?:release|hotfix)\/(\d+\.\d+\.\d+(?:-rc\d{2})?)$/.exec(pull.head.ref);
            if (!match) {
              core.setFailed(`Invalid release branch: ${pull.head.ref}`);
              return;
            }

            core.setOutput("should_tag", "true");
            core.setOutput("version", match[1]);
            core.setOutput("branch", pull.head.ref);

      - name: Create and push tag
        if: steps.release.outputs.should_tag == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          BRANCH: ${{ steps.release.outputs.branch }}
        run: |
          git fetch --force --tags
          if git rev-parse --verify --quiet "refs/tags/$VERSION"; then
            echo "::error::Tag $VERSION already exists."
            exit 1
          fi
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION from $BRANCH"
          git push origin "$VERSION"
