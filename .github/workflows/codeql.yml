name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-gradle
      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
      - name: Select CodeQL-compatible Kotlin
        run: sed -i 's/jetbrains-kotlin = "2.4.0"/jetbrains-kotlin = "2.3.21"/' gradle/libs.versions.toml
      - run: ./gradlew ciBuild
      - uses: github/codeql-action/analyze@v4
