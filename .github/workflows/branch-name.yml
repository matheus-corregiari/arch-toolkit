name: Branch Name

on:
  pull_request:
    branches: [ "master" ]
    types: [ opened, edited, reopened, synchronize ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release Branch
    runs-on: ubuntu-latest
    steps:
      - name: Validate release and hotfix version
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" != release/* && "$BRANCH" != hotfix/* ]]; then
            echo "No release version validation required for $BRANCH"
            exit 0
          fi

          if [[ ! "$BRANCH" =~ ^(release|hotfix)/[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]{2})?$ ]]; then
            echo "::error::Invalid release branch: $BRANCH"
            echo "Expected release/X.Y.Z, release/X.Y.Z-rcNN, hotfix/X.Y.Z, or hotfix/X.Y.Z-rcNN."
            exit 1
          fi
