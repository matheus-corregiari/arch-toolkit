name: Release

on:
  push:
    tags: [ "*.*.*" ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Validate tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]{2})?$ ]]; then
            echo "::error::Invalid release tag: $VERSION"
            exit 1
          fi

  verify:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/version-name
      - run: ./gradlew ciBuild ciTest

  publish:
    needs: verify
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/version-name
        with:
          ossrh_username: ${{ secrets.OSSRH_USERNAME }}
          ossrh_password: ${{ secrets.OSSRH_PASSWORD }}
          mavencentral_username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          mavencentral_password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          sign_keyid: ${{ secrets.SIGN_KEYID }}
          sign_password: ${{ secrets.SIGN_PASSWORD }}
          sign_filename: ${{ secrets.SIGN_FILENAME }}
      - run: ./gradlew ciPublishMavenCentral

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
